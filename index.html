<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>dormMNL</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;overflow-x:hidden;}
:root{
  --bg:#F5F3EE;--surface:#FFFFFF;--surface2:#F0EDE8;
  --text:#1A1A1A;--text2:#6B6760;--text3:#A09D99;
  --accent:#D85A30;--accent2:#185FA5;--green:#3B6D11;
  --border:#E4E1DC;--radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
h1,h2,h3{font-family:'Syne',sans-serif;font-weight:700;letter-spacing:normal;}
.hidden{display:none!important;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:1000;width:100%;box-sizing:border-box;}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.nav-logo span{color:var(--text);}
.nav-links{display:flex;gap:8px;align-items:center;}
.nav-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;}
.nav-btn:hover{background:var(--bg);color:var(--text);}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.nav-btn.primary:hover{background:#c04d26;}
.nav-user{display:flex;align-items:center;gap:10px;font-size:13px;}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
.role-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.role-renter{background:#E6F1FB;color:#185FA5;}
.role-rentee{background:#EAF3DE;color:#3B6D11;}
.role-admin{background:#FAECE7;color:#993C1D;}

/* NOTIF BELL */
.notif-btn{position:relative;background:none;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:16px;color:var(--text2);transition:all .15s;}
.notif-btn:hover{background:var(--bg);}
.notif-badge{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* PAGES */
.page{display:none;padding:2rem;width:100%;box-sizing:border-box;max-width:1280px;margin-left:auto;margin-right:auto;}
.page-inner{max-width:1200px;margin:0 auto;width:100%;}
.page.active{display:block;}
.page.active{display:block;}

/* AUTH */
.auth-wrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:2rem;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow);}
.auth-title{font-size:26px;font-weight:800;margin-bottom:.25rem;}
.auth-sub{color:var(--text2);font-size:14px;margin-bottom:2rem;}
.form-group{margin-bottom:1.25rem;}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:.4rem;color:var(--text2);}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border .15s;}
.form-input:focus{border-color:var(--accent);}
select.form-input{cursor:pointer;}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#c04d26;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:#fcebeb;color:#A32D2D;border:1px solid #F7C1C1;}
.btn-danger:hover{background:#f7c1c1;}
.btn-info{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4;}
.btn-success{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97;}
.btn-warning{background:#FAEEDA;color:#854F0B;border:1px solid #F5D7A3;}
.btn-full{width:100%;justify-content:center;}
.auth-switch{text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text2);}
.auth-switch a{color:var(--accent);text-decoration:none;font-weight:600;}

/* HOME */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:3rem 2rem;text-align:center;margin-bottom:2rem;}
.hero h1{font-size:42px;font-weight:800;line-height:1.1;margin-bottom:.75rem;}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--text2);font-size:16px;margin-bottom:2rem;max-width:500px;margin-left:auto;margin-right:auto;}
.search-bar{display:flex;gap:8px;max-width:600px;margin:0 auto;flex-wrap:wrap;}
.search-bar input{flex:1;min-width:200px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);}
.search-bar input:focus{outline:none;border-color:var(--accent);}
.stats-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;}
.stat-pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;color:var(--text2);}
.stat-pill strong{color:var(--text);}

/* FILTER ROW */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;}
.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;}
.filter-select:focus{border-color:var(--accent);}
.results-count{margin-left:auto;font-size:13px;color:var(--text2);}

/* DORM GRID */
.dorm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;}
.dorm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.dorm-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.dorm-img{height:180px;background:linear-gradient(135deg,#E4E1DC,#D5D2CC);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden;width:100%;}
.dorm-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:block;}
.img-upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;}
.img-upload-area:hover,.img-upload-area.drag-over{border-color:var(--accent);background:#FEF0EB;}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem;margin-top:.75rem;}
.img-preview-item{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
.img-preview-item img{width:100%;height:100%;object-fit:cover;}
.img-preview-item .remove-img{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dorm-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem;margin-bottom:1rem;}
.dorm-gallery img{width:100%;height:80px;object-fit:cover;border-radius:var(--radius-sm);cursor:pointer;transition:transform .15s;display:block;}
.dorm-gallery img:hover{transform:scale(1.03);}
.dorm-gallery-main{width:100%;height:auto;max-height:500px;object-fit:contain;border-radius:var(--radius-sm);margin-bottom:.5rem;display:block;background:#000;}
.dorm-availability{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.avail-yes{background:#EAF3DE;color:#3B6D11;}
.avail-no{background:#fcebeb;color:#A32D2D;}
.dorm-body{padding:1rem;}
.dorm-name{font-weight:700;font-size:15px;margin-bottom:4px;}
.dorm-addr{font-size:12px;color:var(--text2);margin-bottom:.75rem;display:flex;align-items:center;gap:4px;}
.dorm-meta{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:.75rem;}
.meta-item{font-size:12px;display:flex;align-items:center;gap:3px;color:var(--text2);}
.meta-item strong{color:var(--text);font-size:13px;}
.dorm-price{font-size:20px;font-weight:800;color:var(--accent);}
.dorm-price span{font-size:12px;color:var(--text2);font-weight:400;}
.stars{color:#EF9F27;font-size:13px;}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:.5rem;}
.tag{padding:2px 8px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--surface);border-radius:var(--radius);max-width:700px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-size:18px;}
.modal-body{padding:1.5rem;}
.modal-close{background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:4px;}
.modal-close:hover{background:var(--bg);}

/* MAP */
#map{height:500px;border-radius:var(--radius);border:1px solid var(--border);}
.map-wrap{position:relative;}
.map-legend{position:absolute;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;z-index:500;font-size:12px;}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* SECTION HEADERS */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
.section-title{font-size:22px;font-weight:800;}
.page-subtitle{color:var(--text2);font-size:14px;margin-top:.25rem;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--bg);}
.action-btns{display:flex;gap:6px;flex-wrap:wrap;}

/* DASHBOARD CARDS */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
.dash-num{font-size:28px;font-weight:800;font-family:'Syne',sans-serif;}
.dash-label{font-size:12px;color:var(--text2);margin-top:4px;}
.dash-num.accent{color:var(--accent);}
.dash-num.blue{color:var(--accent2);}
.dash-num.green{color:var(--green);}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap;}
.tab{padding:8px 16px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ALERT */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:1rem;}
.alert-success{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97;}
.alert-error{background:#fcebeb;color:#A32D2D;border:1px solid #F7C1C1;}
.alert-info{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4;}
.alert-warning{background:#FAEEDA;color:#854F0B;border:1px solid #F5D7A3;}

/* REVIEW */
.review-item{padding:1rem 0;border-bottom:1px solid var(--border);}
.review-item:last-child{border-bottom:none;}
.review-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
.review-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent2);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.review-name{font-size:13px;font-weight:600;}
.review-date{font-size:11px;color:var(--text3);}

/* LOG */
.log-action{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.log-login{background:#E6F1FB;color:#185FA5;}
.log-booking{background:#EAF3DE;color:#3B6D11;}
.log-dorm{background:#FAEEDA;color:#854F0B;}
.log-admin{background:#FAECE7;color:#993C1D;}
.log-delete{background:#fcebeb;color:#A32D2D;}
.log-review{background:#EEEDFE;color:#534AB7;}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:1rem;}

/* CHIP for amenities */
.amenity-list{display:flex;flex-wrap:wrap;gap:6px;margin:.5rem 0;}
.amenity{padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);}

/* LISTING FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
.form-section{margin-bottom:1.5rem;}
.form-section-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px;}
textarea.form-input{resize:vertical;min-height:80px;}
.star-select{display:flex;gap:4px;font-size:22px;cursor:pointer;}
.star-select span{color:var(--border);}
.star-select span.on{color:#EF9F27;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:420px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem;background:var(--bg);}
.chat-bubble{max-width:72%;padding:.65rem 1rem;border-radius:var(--radius);font-size:13px;line-height:1.4;}
.chat-bubble.mine{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.chat-bubble.theirs{background:var(--surface);color:var(--text);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:4px;}
.chat-bubble .bubble-meta{font-size:10px;opacity:.65;margin-top:.25rem;}
.chat-input-row{display:flex;gap:8px;padding:.75rem;border-top:1px solid var(--border);background:var(--surface);}
.chat-input-row input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);outline:none;}
.chat-input-row input:focus{border-color:var(--accent);}

/* NOTIFICATION PANEL */
.notif-panel{position:fixed;top:64px;right:1rem;width:360px;max-height:500px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:3000;display:flex;flex-direction:column;overflow:hidden;}
.notif-panel-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;}
.notif-list{overflow-y:auto;flex:1;}
.notif-item{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:background .1s;display:flex;gap:.75rem;align-items:flex-start;}
.notif-item:hover{background:var(--bg);}
.notif-item.unread{background:#FEF8F5;}
.notif-item.unread:hover{background:#FAF0EB;}
.notif-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.notif-content{flex:1;}
.notif-msg{line-height:1.4;color:var(--text);}
.notif-time{font-size:11px;color:var(--text3);margin-top:3px;}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}

/* CHAT LIST */
.chat-item{display:flex;align-items:center;gap:1rem;padding:.875rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.chat-item:hover{background:var(--bg);}
.chat-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent2);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-info{flex:1;min-width:0;}
.chat-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.chat-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-meta{text-align:right;flex-shrink:0;}
.chat-time{font-size:11px;color:var(--text3);}
.chat-unread{background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:4px;margin-left:auto;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="showPage('home')" style="cursor:pointer;">dormMNL</div>
  <div class="nav-user" id="nav-user-area"></div>
</nav>

<!-- NOTIFICATION PANEL (hidden by default) -->
<div class="notif-panel hidden" id="notif-panel">
  <div class="notif-panel-header">
    <span>🔔 Notifications</span>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" style="font-size:11px;padding:4px 8px;" onclick="markAllNotifsRead()">Mark all read</button>
      <button style="background:none;border:none;font-size:18px;color:var(--text2);cursor:pointer;" onclick="toggleNotifPanel()">✕</button>
    </div>
  </div>
  <div class="notif-list" id="notif-list"><div style="text-align:center;padding:2rem;color:var(--text2)">⏳ Loading...</div></div>
</div>

<!-- PAGES -->
<div id="page-home" class="page active"></div>
<div id="page-login" class="page"></div>
<div id="page-register" class="page"></div>
<div id="page-map" class="page"></div>
<div id="page-dashboard" class="page"></div>
<div id="page-admin" class="page"></div>
<div id="page-listing" class="page"></div>
<div id="page-forgot" class="page"></div>
<div id="page-reset" class="page"></div>
<div id="page-chat" class="page"></div>
<div id="page-notifications" class="page"></div>
<div id="page-dorm-dash" class="page"></div>
<div id="page-admin-bin" class="page"></div>
<div id="page-rentee-dash" class="page"></div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
// ============================
// API CONFIG
// ============================
const API = "api";

async function post(endpoint, data) {
  const res = await fetch(`${API}/${endpoint}`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`HTTP ${res.status}: ${text.substring(0, 200)}`);
  }
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error(`Invalid JSON: ${text.substring(0, 200)}`);
  }
}

async function get(endpoint, params = {}) {
  const q = new URLSearchParams(params).toString();
  const res = await fetch(`${API}/${endpoint}${q ? "?" + q : ""}`);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`HTTP ${res.status}: ${text.substring(0, 200)}`);
  }
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error(`Invalid JSON: ${text.substring(0, 200)}`);
  }
}

// ============================
// STATE
// ============================
let currentUser = null;
let searchQuery = "";
let filterUniversity = "all";
let filterPrice = "all";
let filterAvail = "all";
let mapInstance = null;
let mapMarkers = [];
let pendingReview = {dormId:null,rating:0};
let resetSession = {email:null,code:null};
let cachedDorms = [];
let notifPanelOpen = false;
let notifPollTimer = null;
let activeChatBookingId = null;
let chatPollTimer = null;

// ============================
// HELPERS
// ============================
function starsHTML(rating) {
  let s = "";
  for (let i = 1; i <= 5; i++) s += `<span style="color:${i <= Math.round(rating) ? '#EF9F27' : '#D3D1C7'}">★</span>`;
  return s;
}

function showAlert(msg, type = "success") {
  const a = document.createElement("div");
  a.className = `alert alert-${type}`;
  a.textContent = msg;
  document.body.appendChild(a);
  Object.assign(a.style, {position:"fixed",top:"80px",right:"20px",zIndex:"9999",minWidth:"260px",boxShadow:"0 4px 20px rgba(0,0,0,.15)"});
  setTimeout(() => a.remove(), 3000);
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

function initials(name) {
  return (name||"?").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();

function checkPwStrength(pw) {
  const fill = document.getElementById("pw-strength-fill");
  const label = document.getElementById("pw-strength-label");
  if (!fill || !label) return;
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    {pct:0,color:"transparent",text:""},
    {pct:20,color:"#E24B4A",text:"Weak"},
    {pct:40,color:"#EF9F27",text:"Fair"},
    {pct:60,color:"#EF9F27",text:"Good"},
    {pct:80,color:"#639922",text:"Strong"},
    {pct:100,color:"#639922",text:"Very Strong"},
  ];
  const lvl = levels[score] || levels[0];
  fill.style.width = lvl.pct + "%";
  fill.style.background = lvl.color;
  label.textContent = lvl.text ? `Password strength: ${lvl.text}` : "";
  label.style.color = lvl.color;
}

    if (!data.success) { showAlert(data.message, "error"); return; }
    resetSession = {email: null, code: null};

async function loadAdminMsgThread() {
  const box = document.getElementById("admin-msg-thread");
  if (!box) return;
  try {
    const msgs = await get("admin_messages.php", {action:"conversation_renter", renter_id: currentUser.id});
    if (!msgs || !msgs.length) {
      box.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2);font-size:13px;">No messages yet. Send a message to the admin below.</div>`;
      return;
    }
    box.innerHTML = msgs.map(m => {
      const isMine = m.sent_by == currentUser.id;
      const t = m.created_at ? new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
      return `<div class="chat-bubble ${isMine ? 'mine' : 'theirs'}" style="max-width:80%;">
        ${!isMine ? `<div style="font-size:10px;font-weight:600;opacity:.7;margin-bottom:3px;">${m.admin_name||"Admin"}</div>` : ""}
        ${m.message}
        <div class="bubble-meta">${t}</div>
      </div>`;
    }).join("");
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    if (box) box.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2)">Could not load messages.</div>`;
  }
}

async function sendAdminReply() {
  const input = document.getElementById("admin-reply-input");
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  try {
    const data = await post("admin_messages.php", {action: "send_renter", renter_id: currentUser.id, message: msg});
    if (!data.success) { showAlert(data.message || "Failed to send", "error"); return; }
    await loadAdminMsgThread();
  } catch(e) { showAlert("Connection error sending message.", "error"); }
}

async function openChat(bookingId) {
  activeChatBookingId = bookingId;
  stopChatPolling();

  let bookingInfo = null;
  try {
    const myBookings = await get("bookings.php", {action:"list", user_id: currentUser.id});
    const ownerBookings = currentUser.role === "renter" ? await get("bookings.php", {action:"list", owner_id: currentUser.id}) : [];
    bookingInfo = [...myBookings, ...ownerBookings].find(b => b.id == bookingId);
  } catch(e) {}

  const dormName = bookingInfo ? (bookingInfo.dorm_name || "Dorm Chat") : "Dorm Chat";

  document.getElementById("modal-container").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this){closeModal();stopChatPolling();}">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <div>
        <h2>💬 ${dormName}</h2>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">Booking #${bookingId} · Approved</div>
      </div>
      <button class="modal-close" onclick="closeModal();stopChatPolling()">✕</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-messages-box"><div style="text-align:center;padding:2rem;color:var(--text2)">⏳ Loading...</div></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChatMsg(${bookingId})"/>
          <button class="btn btn-primary" style="padding:9px 16px;" onclick="sendChatMsg(${bookingId})">Send</button>
        </div>
      </div>
    </div>
  </div></div>`;

  await loadChatMessages(bookingId);
  post("chat.php", {action: "mark_read", booking_id: bookingId, user_id: currentUser.id}).catch(()=>{});
  loadNotifCount();
  chatPollTimer = setInterval(() => loadChatMessages(bookingId), 5000);
}

async function loadChatMessages(bookingId) {
  try {
    const msgs = await get("chat.php", {action:"messages", booking_id: bookingId, user_id: currentUser.id});
    const box = document.getElementById("chat-messages-box");
    if (!box) { stopChatPolling(); return; }
    if (!msgs || msgs.error || (msgs.success === false)) {
      box.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2)">Could not load messages.<br><small>${msgs.message||""}</small></div>`;
      return;
    }
    const wasAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 40;
    if (!msgs.length) {
      box.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2)">No messages yet. Say hi! 👋</div>`;
      return;
    }
    box.innerHTML = msgs.map(m => {
      const mine = m.sender_id == currentUser.id;
      const t = m.created_at ? new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
      return `<div class="chat-bubble ${mine?'mine':'theirs'}">
        ${!mine ? `<div style="font-size:10px;font-weight:600;opacity:.7;margin-bottom:3px;">${m.sender_name}</div>` : ""}
        ${m.message}
        <div class="bubble-meta">${t}</div>
      </div>`;
    }).join("");
    if (wasAtBottom) box.scrollTop = box.scrollHeight;
  } catch(e) {}
}

async function sendChatMsg(bookingId) {
  const input = document.getElementById("chat-input");
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  try {
    const data = await post("chat.php", {action: "send", booking_id: bookingId, sender_id: currentUser.id, message: msg});
    if (!data.success) { showAlert(data.message || "Failed to send", "error"); return; }
    await loadChatMessages(bookingId);
    const box = document.getElementById("chat-messages-box");
    if (box) box.scrollTop = box.scrollHeight;
  } catch(e) { showAlert("Connection error.", "error"); }
}

function dormCardHTML(d) {
  const rating   = parseFloat(d.avg_rating) || 0;
  const reviews  = parseInt(d.review_count) || 0;
  const icons    = ["🏠","🏡","🏢","🏗️","🏘️"];
  const amenities = Array.isArray(d.amenities) ? d.amenities : (d.amenities ? d.amenities.split(",") : []);
  const images   = Array.isArray(d.images) && d.images.length ? d.images : null;
  const imgHTML  = images
    ? `<img src="${images[0]}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onerror="this.style.display='none'">`
    : `<span style="font-size:40px;">${icons[d.id % icons.length]}</span>`;
  return `<div class="dorm-card" onclick="showDormModal(${d.id})">
  <div class="dorm-img">
    ${imgHTML}
    ${images && images.length > 1 ? `<span style="position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;">📷 ${images.length} photos</span>` : ""}
    <span class="dorm-availability ${d.availability > 0 ? 'avail-yes' : 'avail-no'}" style="position:absolute;top:10px;right:10px;">${d.availability > 0 ? d.availability + " slots" : "Full"}</span>
  </div>
  <div class="dorm-body">
    <div class="dorm-name">${d.name}</div>
    <div class="dorm-addr">📍 ${d.address}</div>
    <div class="dorm-meta">
      <div class="meta-item">${starsHTML(rating)} <strong>${rating.toFixed(1)}</strong> (${reviews})</div>
      <div class="meta-item">🎓 <strong>${d.university}</strong></div>
    </div>
    <div class="tag-row">${amenities.slice(0,3).map(a=>`<span class="tag">${a}</span>`).join("")}${amenities.length>3?`<span class="tag">+${amenities.length-3}</span>`:""}</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:.75rem;">
      <div class="dorm-price">₱${parseFloat(d.price).toLocaleString()}<span>/mo</span></div>
      <span style="font-size:12px;color:var(--text2);">Near ${d.university}</span>
    </div>
  </div></div>`;
}

async function doBooking(dormId) {
  if (!currentUser) { showAlert("Please sign in", "error"); return; }
  const msg = document.getElementById("book-msg") ? document.getElementById("book-msg").value : "";
  try {
    const data = await post("bookings.php?action=add", {user_id: currentUser.id, dorm_id: dormId, message: msg});
    if (!data.success) { showAlert(data.message, "error"); return; }
    showAlert("Booking request sent! The owner will respond soon.");
    closeModal();
  } catch(e) { showAlert("Connection error.", "error"); }
}

async function doCancelBooking(bookingId) {
  if (!confirm("Cancel your booking application for this dorm? You can apply to another dorm afterwards.")) return;
  try {
    const data = await post("bookings.php?action=update", {id: bookingId, status: "cancelled", user_id: currentUser.id});
    if (!data.success) { showAlert(data.message || "Could not cancel booking.", "error"); return; }
    showAlert("Booking cancelled. You can now apply to another dorm.");
    closeModal();
    const renteeActive = document.getElementById("page-rentee-dash")?.classList.contains("active");
    if (renteeActive) renderRenteeDashboard();
    else renderHome();
  } catch(e) { showAlert("Connection error.", "error"); }
}

async function doVacate(bookingId) {
  if (!confirm("Are you sure you want to vacate this dorm? This will free up your slot.")) return;
  try {
    const data = await post("bookings.php?action=update", {id: bookingId, status: "vacated", user_id: currentUser.id, owner_id: currentUser.id});
    if (!data.success) { showAlert(data.message || "Error", "error"); return; }
    showAlert("You have successfully vacated. The slot is now available for others.");
    closeModal();
    const renteeActive = document.getElementById("page-rentee-dash")?.classList.contains("active");
    if (renteeActive) renderRenteeDashboard();
    else renderHome();
  } catch(e) { showAlert("Connection error.", "error"); }
}

function showReviewForm(dormId) {
  pendingReview = {dormId, rating: 0};
  document.getElementById("review-form-area").innerHTML = `
  <div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;margin-top:.75rem;">
    <div class="form-section-title">Your Review</div>
    <div class="star-select" id="star-picker">${[1,2,3,4,5].map(i=>`<span onclick="setRating(${i})" id="star-${i}">★</span>`).join("")}</div>
    <textarea class="form-input" id="review-text" placeholder="Share your experience..." style="margin:.75rem 0;"></textarea>
    <button class="btn btn-primary" style="font-size:13px;padding:8px 16px;" onclick="submitReview(${dormId})">Submit Review</button>
  </div>`;
}

function setRating(n) {
  pendingReview.rating = n;
  for (let i = 1; i <= 5; i++) document.getElementById("star-"+i).className = i <= n ? "on" : "";
}

async function submitReview(dormId) {
  if (!pendingReview.rating) { showAlert("Please select a rating", "error"); return; }
  const text = document.getElementById("review-text").value.trim();
  if (!text) { showAlert("Please write a comment", "error"); return; }
  try {
    const data = await post("reviews.php?action=add", {user_id: currentUser.id, dorm_id: dormId, rating: pendingReview.rating, comment: text});
    if (!data.success) { showAlert(data.message, "error"); return; }
    showAlert("Review submitted! Thank you.");
    showDormModal(dormId);
  } catch(e) { showAlert("Connection error.", "error"); }
}

function filterMapByUniv(univ) {

  mapInstance.setView([c[0],c[1]],c[2]);
}

async function openPastChat(bookingId) {
  document.getElementById("modal-container").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this){closeModal();}">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <div>
        <h2>💬 Past Messages</h2>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">Booking #${bookingId} · Vacated</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-messages-box"><div style="text-align:center;padding:2rem;color:var(--text2)">⏳ Loading...</div></div>
        <div style="padding:.75rem 1rem;border-top:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--text3);text-align:center;">
          This booking has been vacated. Messaging is disabled.
        </div>
      </div>
    </div>
  </div></div>`;

  try {
    const msgs = await get("chat.php", {action:"messages", booking_id: bookingId, user_id: currentUser.id});
    const box = document.getElementById("chat-messages-box");
    if (!box) return;
    if (!msgs || msgs.success === false || !msgs.length) {
      box.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2)">No messages found for this booking.</div>`;
      return;
    }
    box.innerHTML = msgs.map(m => {
      const mine = m.sender_id == currentUser.id;
      const t = m.created_at ? new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
      return `<div class="chat-bubble ${mine?'mine':'theirs'}">
        ${!mine ? `<div style="font-size:10px;font-weight:600;opacity:.7;margin-bottom:3px;">${m.sender_name}</div>` : ""}
        ${m.message}
        <div class="bubble-meta">${t}</div>
      </div>`;
    }).join("");
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    const box = document.getElementById("chat-messages-box");
    if (box) box.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2)">Could not load messages.</div>`;
  }
}

function switchDashTab(tab, btn, dorms, bookings) {
  document.querySelectorAll("#page-dashboard .tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  const c = document.getElementById("dash-tab-content");
  if (tab === "listings") c.innerHTML = renderMyListings(dorms);
  else if (tab === "bookings") c.innerHTML = renderDashBookings(bookings);
  else if (tab === "tenants") c.innerHTML = renderActiveTenants(bookings);
  else if (tab === "former") c.innerHTML = renderFormerTenants(bookings);
}

async function submitEditDorm(dormId) {
  const isAdmin = currentUser && currentUser.role === "admin";
  const desc    = document.getElementById("ed-desc").value.trim();
  const avail   = parseInt(document.getElementById("ed-avail").value);
  const amenities = [...document.querySelectorAll(".ed-amenity-check:checked")].map(x => x.value);

  const payload = {
    id: dormId, user_id: currentUser.id, user_role: currentUser.role,
    description: desc, availability: avail, amenities: amenities
  };

  if (isAdmin) {
    payload.name       = document.getElementById("ed-name").value.trim();
    payload.address    = document.getElementById("ed-addr").value.trim();
    payload.university = document.getElementById("ed-univ").value;
    payload.price      = parseFloat(document.getElementById("ed-price").value);
    payload.total_slots = parseInt(document.getElementById("ed-total").value);
  }

  const btn = document.getElementById("ed-save-btn");
  if (btn) { btn.disabled = true; btn.textContent = "Saving..."; }

  try {
    const data = await post("dorms.php?action=edit", payload);
    if (!data.success) { showAlert(data.message || "Error saving changes", "error"); if (btn) { btn.disabled=false; btn.textContent="Save Changes"; } return; }

    const editFiles = window._editFiles || [];
    if (editFiles.length > 0) {
      if (btn) btn.textContent = `Uploading ${editFiles.length} photo(s)...`;
      const formData = new FormData();
      formData.append("dorm_id", dormId);
      formData.append("user_id", currentUser.id);
      editFiles.forEach((f, i) => formData.append(`image_${i}`, f));
      await fetch(`api/dorms.php?action=upload_images`, { method:"POST", body: formData });
    }

    window._editFiles = [];
    showAlert("Dorm updated successfully!");
    closeModal();
    if (isAdmin) loadAdminTab("dorms");
    else renderDashboard();
  } catch(e) {
    showAlert("Connection error.", "error");
    if (btn) { btn.disabled=false; btn.textContent="Save Changes"; }
  }
}

function handleEditDrop(e, dormId) {
  e.preventDefault();
  document.getElementById("ed-upload-area").classList.remove("drag-over");
  handleEditImages(e.dataTransfer.files, dormId);
}

function handleEditImages(files, dormId) {
  if (!window._editFiles) window._editFiles = [];
  const maxSize = 5 * 1024 * 1024;
  Array.from(files).forEach(file => {
    if (!file.type.startsWith("image/")) { showAlert(`${file.name} is not an image`, "error"); return; }
    if (file.size > maxSize) { showAlert(`${file.name} exceeds 5MB`, "error"); return; }
    window._editFiles.push(file);
  });
  renderEditPreviews();
}

function renderEditPreviews() {
  const grid = document.getElementById("ed-new-preview");

async function deleteExistingImage(imgPath, dormId) {
  if (!confirm("Remove this photo?")) return;
  try {
    const data = await post("dorms.php?action=delete_image", {
      dorm_id: dormId, user_id: currentUser.id,
      user_role: currentUser.role, image: imgPath
    });
    if (!data.success) { showAlert("Could not remove photo", "error"); return; }
    const key = btoa(imgPath).replace(/=/g,"");
    const el  = document.getElementById("ed-img-" + key);
    if (el) el.remove();
    showAlert("Photo removed.");
  } catch(e) { showAlert("Connection error.", "error"); }
}

function handleListingDrop(e) {
  e.preventDefault();
  document.getElementById("nl-upload-area").classList.remove("drag-over");
  handleListingImages(e.dataTransfer.files);
}

function handleListingImages(files) {
  const maxFiles = 8;
  const maxSize  = 5 * 1024 * 1024;
  Array.from(files).forEach(file => {
    if (listingFiles.length >= maxFiles) { showAlert(`Max ${maxFiles} photos allowed`, "error"); return; }
    if (!file.type.startsWith("image/")) { showAlert(`${file.name} is not an image`, "error"); return; }
    if (file.size > maxSize) { showAlert(`${file.name} exceeds 5MB`, "error"); return; }
    listingFiles.push(file);
  });
  renderListingPreviews();
}

function renderListingPreviews() {
  const grid = document.getElementById("nl-preview-grid");
  if (!grid) return;
  if (!listingFiles.length) { grid.innerHTML = ""; return; }

async function submitListing() {
  const name  = document.getElementById("nl-name").value.trim();
  const addr  = document.getElementById("nl-addr").value.trim();
  const univ  = document.getElementById("nl-univ").value;
  const desc  = document.getElementById("nl-desc").value.trim();
  const price = parseFloat(document.getElementById("nl-price").value);
  const slots = parseInt(document.getElementById("nl-slots").value);
  if (!name || !addr || !desc || !price || !slots) { showAlert("Please fill all required fields", "error"); return; }

  if (!listingLatLng.lat || !listingLatLng.lng) {
    showAlert("Please pin your dorm location on the map before submitting.", "error");
    document.getElementById("nl-map-picker")?.scrollIntoView({behavior:"smooth", block:"center"});
    return;
  }

  const amenities = [...document.querySelectorAll(".amenity-check:checked")].map(x => x.value);
  const btn = document.getElementById("nl-submit-btn");
  if (btn) { btn.disabled = true; btn.textContent = "Submitting..."; }

  try {
    const data = await post("dorms.php?action=add", {
      owner_id: currentUser.id, name, description: desc, address: addr,
      university: univ, price,
      lat: parseFloat(listingLatLng.lat),
      lng: parseFloat(listingLatLng.lng),
      availability: slots, total_slots: slots,
      amenities: amenities.length ? amenities : ["WiFi"]
    });
    if (!data.success) { showAlert(data.message || "Error creating listing", "error"); if (btn) { btn.disabled=false; btn.textContent="Submit Listing for Approval"; } return; }

    const dormId = data.id;

    if (listingFiles.length > 0) {
      if (btn) btn.textContent = `Uploading ${listingFiles.length} photo(s)...`;
      const formData = new FormData();
      formData.append("dorm_id", dormId);
      formData.append("user_id", currentUser.id);
      listingFiles.forEach((f, i) => formData.append(`image_${i}`, f));

      const upRes = await fetch(`api/dorms.php?action=upload_images`, { method:"POST", body: formData });
      const upData = await upRes.json();
      if (!upData.success) {
        showAlert("Listing created but some photos failed to upload: " + (upData.errors||[]).join(", "), "error");
      } else {
        showAlert(`Listing submitted with ${upData.uploaded.length} photo(s)! Pending admin approval.`);
      }
    } else {
      showAlert("Listing submitted! Pending admin approval.");
    }

    listingFiles = [];
    showPage("dashboard");
  } catch(e) {
    showAlert("Connection error.", "error");
    if (btn) { btn.disabled=false; btn.textContent="Submit Listing for Approval"; }
  }
}

      ` : ""}

}

function switchRenteeTab(tab, btn) {
  document.querySelectorAll("#page-rentee-dash .tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  const all = window._renteeBookings || [];
  let filtered;
  if (tab === "all")      filtered = all;
  else if (tab === "pending")  filtered = all.filter(b => b.status === "pending");
  else if (tab === "approved") filtered = all.filter(b => b.status === "approved");
  else if (tab === "closed")   filtered = all.filter(b => ["rejected","vacated","cancelled"].includes(b.status));
  document.getElementById("rentee-tab-content").innerHTML = renderRenteeBookingTable(filtered);
}

function filterAdminUsers() {
  const q = (document.getElementById("admin-user-search")?.value || "").toLowerCase();
  const role = document.getElementById("admin-user-role")?.value || "";
  const status = document.getElementById("admin-user-status")?.value || "";
  let filtered = _adminUsersCache;
  if (q) filtered = filtered.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || String(u.id).includes(q));
  if (role) filtered = filtered.filter(u => u.role === role);
  if (status) filtered = filtered.filter(u => u.status === status);

function filterAdminDorms() {
  const q = (document.getElementById("admin-dorm-search")?.value || "").toLowerCase();
  const univ = document.getElementById("admin-dorm-univ")?.value || "";
  const status = document.getElementById("admin-dorm-status")?.value || "";
  let filtered = _adminDormsCache;
  if (q) filtered = filtered.filter(d => d.name.toLowerCase().includes(q) || (d.owner_name||"").toLowerCase().includes(q) || (d.address||"").toLowerCase().includes(q));
  if (univ) filtered = filtered.filter(d => d.university === univ);
  if (status) filtered = filtered.filter(d => d.status === status);
  const countEl = document.getElementById("admin-dorm-count");
  if (countEl) countEl.textContent = `${filtered.length} listing${filtered.length!==1?"s":""}`;
  const tableEl = document.getElementById("admin-dorms-table");
  if (tableEl) tableEl.innerHTML = renderDormsTable(filtered);
}

function renderBookingsTable(bookings) {
  if (!bookings.length) return `<div class="empty"><div class="empty-icon">📋</div><p>No bookings match your search.</p></div>`;

function filterAdminBookings() {
  const q = (document.getElementById("admin-booking-search")?.value || "").toLowerCase();

  let filtered = _adminBookingsCache;
  if (q) filtered = filtered.filter(b => (b.student_name||"").toLowerCase().includes(q) || (b.dorm_name||"").toLowerCase().includes(q) || String(b.id).includes(q));
  if (status) filtered = filtered.filter(b => b.status === status);
  const countEl = document.getElementById("admin-booking-count");
  if (countEl) countEl.textContent = `${filtered.length} booking${filtered.length!==1?"s":""}`;
  const tableEl = document.getElementById("admin-bookings-table");

function filterAdminRenters() {
  const q = (document.getElementById("admin-renter-search")?.value || "").toLowerCase();
  const list = document.getElementById("admin-contact-list");
  if (!list) return;
  const items = list.querySelectorAll(".chat-item");
  let shown = 0;
  items.forEach(item => {
    const name = item.querySelector(".chat-name")?.textContent.toLowerCase() || "";
    const email = item.querySelector(".chat-preview")?.textContent.toLowerCase() || "";
    const match = !q || name.includes(q) || email.includes(q);
    item.style.display = match ? "" : "none";
    if (match) shown++;
  });
  const countEl = document.getElementById("admin-renter-count");
  if (countEl) countEl.textContent = `${shown} renter${shown!==1?"s":""}`;
}

      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;">
        <div style="font-size:13px;font-weight:700;margin-bottom:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;">Photo Gallery</div>
        ${images.length > 0 ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;">
          ${images.slice(0,6).map(img=>`<img src="${img}" style="width:100%;height:60px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'">`).join("")}
        </div>` : `<div style="color:var(--text3);font-size:13px;text-align:center;padding:2rem;">No photos uploaded yet.</div>`}
      </div>
    </div>

    <div class="tabs" style="margin-bottom:1rem;">
      <button class="tab active" id="dorm-tab-tenants" onclick="switchDormTab('tenants',this)">Active Tenants (${tenants.length})</button>
      <button class="tab" id="dorm-tab-pending" onclick="switchDormTab('pending',this)">Pending Requests ${pending.length>0?`<span style="background:var(--accent);color:#fff;border-radius:50%;padding:1px 6px;font-size:11px;margin-left:4px;">${pending.length}</span>`:""}</button>
      <button class="tab" id="dorm-tab-vacated" onclick="switchDormTab('vacated',this)">Former Tenants (${vacated.length})</button>
      <button class="tab" id="dorm-tab-reviews" onclick="switchDormTab('reviews',this)">Reviews (${reviews.length})</button>
    </div>
    <div id="dorm-dash-content">${renderDormTenants(tenants, bookings)}</div>`;

    window._dormDashData = { tenants, pending, vacated, rejected, reviews, bookings, dormId: dorm.id };

  } catch(e) {
    p.innerHTML += `<div class="alert alert-error">Error loading dorm dashboard. Check server connection.</div>`;
  }
}

function switchDormTab(tab, btn) {
  document.querySelectorAll("#page-dorm-dash .tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  const d = window._dormDashData || {};
  const content = document.getElementById("dorm-dash-content");
  if (tab === "tenants") content.innerHTML = renderDormTenants(d.tenants, d.bookings);
  else if (tab === "pending") content.innerHTML = renderDormPending(d.pending, d.dormId);
  else if (tab === "vacated") content.innerHTML = renderDormVacated(d.vacated);
  else if (tab === "reviews") content.innerHTML = renderDormReviews(d.reviews);
}

function renderDormTenants(tenants, allBookings) {
  if (!tenants.length) return `<div class="empty"><div class="empty-icon">👤</div><p>No active tenants right now.</p></div>`;
  return `<div class="table-wrap"><table>
  <thead><tr><th>Student</th><th>Email</th><th>Move-in Date</th><th>Message</th><th>Actions</th></tr></thead>
  <tbody>${tenants.map(b=>`<tr>
    <td><strong>${b.student_name||"Student"}</strong></td>
    <td style="color:var(--text2);font-size:12px;">${b.student_email||"—"}</td>
    <td>${b.date||"—"}</td>
    <td style="max-width:160px;font-size:12px;color:var(--text2);">${b.message||"—"}</td>
    <td><div class="action-btns">
      <button class="btn btn-info" style="font-size:12px;padding:5px 10px;" onclick="openChat(${b.id})">💬 Chat</button>
    </div></td>
  </tr>`).join("")}</tbody></table></div>`;
}

function renderDormPending(pending, dormId) {
  if (!pending.length) return `<div class="empty"><div class="empty-icon">📋</div><p>No pending booking requests.</p></div>`;
  return `<div class="table-wrap"><table>
  <thead><tr><th>Student</th><th>Date Applied</th><th>Message</th><th>Actions</th></tr></thead>
  <tbody>${pending.map(b=>`<tr>
    <td><strong>${b.student_name||"Student"}</strong><br><small style="color:var(--text2)">${b.student_email||""}</small></td>
    <td>${b.date||""}</td>
    <td style="max-width:200px;font-size:12px;color:var(--text2)">${b.message||"—"}</td>
    <td><div class="action-btns">
      <button class="btn btn-success" style="font-size:12px;padding:5px 10px;" onclick="updateBooking(${b.id},'approved',${dormId})">✅ Approve</button>
      <button class="btn btn-danger" style="font-size:12px;padding:5px 10px;" onclick="updateBooking(${b.id},'rejected',${dormId})">❌ Reject</button>
    </div></td>
  </tr>`).join("")}</tbody></table></div>`;
}

function renderDormVacated(vacated) {
  if (!vacated.length) return `<div class="empty"><div class="empty-icon">🚪</div><p>No former tenants yet.</p></div>`;
  return `<div class="table-wrap"><table>
  <thead><tr><th>Student</th><th>Move-in</th><th>Vacated</th></tr></thead>
  <tbody>${vacated.map(b=>`<tr>
    <td><strong>${b.student_name||"Student"}</strong></td>
    <td>${b.date||"—"}</td>
    <td>${b.vacate_date||"—"}</td>
  </tr>`).join("")}</tbody></table></div>`;
}

function renderDormReviews(reviews) {
  if (!reviews.length) return `<div class="empty"><div class="empty-icon">⭐</div><p>No reviews yet.</p></div>`;
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;">
    ${reviews.map(r=>`<div class="review-item">
      <div class="review-header">
        <div class="review-avatar">${initials(r.user_name)}</div>
        <span class="review-name">${r.user_name}</span>
        <span style="margin-left:auto;">${starsHTML(r.rating)}</span>
        <span class="review-date">${r.created_at}</span>
      </div>
      <p style="font-size:13px;color:var(--text2);">${r.comment}</p>
    </div>`).join("")}
  </div>`;
}

async function updateBooking(bookingId, status, dormId) {
  try {
    const data = await post("bookings.php?action=update", {id: bookingId, status, owner_id: currentUser.id});
    if (!data.success) { showAlert(data.message || "Error", "error"); return; }
    showAlert(status === "approved" ? "✅ Booking approved! Rentee can now chat with you." : `Booking ${status}.`);
    if (dormId) {
      currentDormDashId = dormId;
      renderDormDashboard();
    } else {
      renderDashboard();
    }
  } catch(e) { showAlert("Connection error.", "error"); }
}

// ============================
// ADMIN: INACTIVE NOTICE & SEND
// ============================
async function adminSendNotice(dormId, dormName) {
  if (!confirm(`Send an inactive notice for "${dormName}"?\n\nThe owner will have 30 days to update the listing.`)) return;
  try {
    const res = await post("bin.php?action=send_notice", {dorm_id: dormId, admin_id: currentUser.id});
    if (!res.success) { showAlert(res.message || "Error", "error"); return; }
    showAlert("Inactive notice sent! Owner has been notified.");
    loadAdminTab("notices");
  } catch(e) { showAlert("Connection error.", "error"); }
}

async function adminResolveNotice(noticeId) {
  try {
    await post("bin.php?action=resolve_notice", {id: noticeId, admin_id: currentUser.id});
    showAlert("Notice resolved.");
    loadAdminTab("notices");
  } catch(e) { showAlert("Connection error.", "error"); }
}

async function adminProcessExpired() {
  if (!confirm("Process all expired notices?")) return;
  try {
    const res = await post("bin.php?action=process_expired", {admin_id: currentUser.id});
    showAlert(`Done! ${res.deleted||0} dorm(s) auto-deleted and moved to bin.`);
    loadAdminTab("notices");
  } catch(e) { showAlert("Connection error.", "error"); }
}

// ============================
// ADMIN: CONTACT RENTERS
// ============================
let adminMsgRenterId = null;
let adminMsgRenterName = null;

async function adminOpenConversation(renterId, renterName, el) {
  adminMsgRenterId = renterId;
  adminMsgRenterName = renterName;

  document.querySelectorAll("#admin-contact-list .chat-item").forEach(i => i.style.background = "");
  if (el) el.style.background = "var(--bg)";

  const panel = document.getElementById("admin-conversation-panel");
  panel.innerHTML = `
  <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:.75rem;">
    <div class="chat-avatar" style="background:var(--accent2);width:36px;height:36px;font-size:13px;">${initials(renterName)}</div>
    <div>
      <div style="font-weight:700;font-size:14px;">${renterName}</div>
      <div style="font-size:11px;color:var(--text2);">Renter</div>
    </div>
  </div>
  <div class="chat-messages" id="admin-msg-list" style="flex:1;"><div style="text-align:center;padding:2rem;color:var(--text2)">⏳ Loading...</div></div>
  <div class="chat-input-row">
    <input id="admin-msg-input" class="form-input" placeholder="Type a message to ${renterName}..." onkeydown="if(event.key==='Enter')adminSendMessage()"/>
    <button class="btn btn-primary" onclick="adminSendMessage()">Send</button>
  </div>`;

  try {
    const msgs = await get("admin_messages.php", {action:"conversation", admin_id: currentUser.id, renter_id: renterId});
    const list = document.getElementById("admin-msg-list");
    if (!msgs.length) {
      list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2);font-size:13px;">No messages yet. Start the conversation!</div>`;
    } else {
      list.innerHTML = msgs.map(m => {
        const isMine = m.sent_by == currentUser.id;
        const t = m.created_at ? new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
        return `<div class="chat-bubble ${isMine ? 'mine' : 'theirs'}" style="max-width:80%;">
          ${!isMine ? `<div style="font-size:10px;font-weight:600;opacity:.7;margin-bottom:3px;">${m.renter_name||"Renter"}</div>` : ""}
          ${m.message}
          <div class="bubble-meta">${t}</div>
        </div>`;
      }).join("");
      list.scrollTop = list.scrollHeight;
    }
  } catch(e) {
    const list = document.getElementById("admin-msg-list");
    if (list) list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text2)">Could not load messages.</div>`;
  }
}

async function adminSendMessage() {
  const input = document.getElementById("admin-msg-input");
  if (!input) return;
  const msg = input.value.trim();
  if (!msg || !adminMsgRenterId) return;
  input.value = "";
  try {
    const data = await post("admin_messages.php", {
      action: "send",
      admin_id: currentUser.id, renter_id: adminMsgRenterId, message: msg
    });
    if (!data.success) { showAlert(data.message || "Error sending", "error"); return; }
    const msgs = await get("admin_messages.php", {action:"conversation", admin_id: currentUser.id, renter_id: adminMsgRenterId});
    const list = document.getElementById("admin-msg-list");
    if (list && msgs.length) {
      list.innerHTML = msgs.map(m => {
        const isMine = m.sent_by == currentUser.id;
        const t = m.created_at ? new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
        return `<div class="chat-bubble ${isMine ? 'mine' : 'theirs'}" style="max-width:80%;">
          ${!isMine ? `<div style="font-size:10px;font-weight:600;opacity:.7;margin-bottom:3px;">${m.renter_name||"Renter"}</div>` : ""}
          ${m.message}
          <div class="bubble-meta">${t}</div>
        </div>`;
      }).join("");
      list.scrollTop = list.scrollHeight;
    }
  } catch(e) { showAlert("Connection error sending message.", "error"); }
}

// ============================
// ADMIN: RECENTLY DELETED BIN
// ============================
async function renderAdminBin() {
  if (!currentUser || currentUser.role !== "admin") { showPage("home"); return; }
  const p = document.getElementById("page-admin-bin");
  p.innerHTML = `
  <div class="section-header">
    <div><div class="section-title">🗑 Recently Deleted</div><div class="page-subtitle">Items deleted in the last 30 days.</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="showPage('admin')">← Admin Dashboard</button>
      <button class="btn btn-danger" onclick="adminClearExpiredBin()">🧹 Clear Expired</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;">
    <select class="filter-select" id="bin-type-filter" onchange="loadBinItems()">
      <option value="">All Types</option>
      <option value="dorm">Dorms</option>
      <option value="user">Users</option>
    </select>
    <input class="form-input" id="bin-search" placeholder="Search deleted items..." style="max-width:250px;padding:8px 12px;font-size:13px;" oninput="loadBinItems()"/>
    <span class="results-count" id="bin-count"></span>
  </div>
  <div id="bin-content"><div style="text-align:center;padding:3rem;color:var(--text2)">⏳ Loading bin...</div></div>`;

  loadBinItems();
}

async function loadBinItems() {
  const type   = document.getElementById("bin-type-filter")?.value || "";
  const search = document.getElementById("bin-search")?.value || "";
  const content = document.getElementById("bin-content");
  if (!content) return;

  try {
    const items = await get("bin.php", {action:"list", type, search});
    const count = document.getElementById("bin-count");
    if (count) count.textContent = `${items.length} item${items.length!==1?"s":""}`;

    if (!items.length) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">🗑</div><p>The bin is empty.</p></div>`;
      return;
    }

    content.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Type</th><th>Name / Details</th><th>Deleted By</th><th>Deleted At</th><th>Auto-Purge</th><th>Actions</th></tr></thead>
    <tbody>${items.map(item => {
      const d = item.data_parsed || {};
      const isExpired = new Date(item.auto_purge_at) < new Date();
      const typeBadge = item.type === "dorm"
        ? `<span class="log-action log-dorm">🏠 Dorm</span>`
        : `<span class="log-action log-admin">👤 User</span>`;
      const nameInfo = item.type === "dorm"
        ? `<strong>${d.name||"Unknown Dorm"}</strong><br><small style="color:var(--text2)">${d.address||""} · ${d.university||""}</small>`
        : `<strong>${d.name||"Unknown User"}</strong><br><small style="color:var(--text2)">${d.email||""} · ${d.role||""}</small>`;

      return `<tr>
        <td>${typeBadge}</td>
        <td>${nameInfo}</td>
        <td>${item.deleted_by_name||"System"}</td>
        <td style="font-size:12px;color:var(--text2)">${item.deleted_at}</td>
        <td style="font-size:12px;color:${isExpired?"#A32D2D":"var(--text2)"};font-weight:${isExpired?"700":"400"}">${isExpired?"<span class='log-action log-delete'>Expired</span>":item.auto_purge_at}</td>
        <td><div class="action-btns">
          <button class="btn btn-success" style="font-size:12px;padding:5px 10px;" onclick="adminRestoreItem(${item.id},'${item.type}')">↩ Restore</button>
          <button class="btn btn-danger" style="font-size:12px;padding:5px 10px;" onclick="adminPurgeItem(${item.id})">✕ Delete Forever</button>
        </div></td>
      </tr>`;
    }).join("")}</tbody></table></div>`;

  } catch(e) {
    const content = document.getElementById("bin-content");
    if (content) content.innerHTML = `<div class="alert alert-error">Error loading bin. Make sure bin.php is installed.</div>`;
  }
}

async function adminRestoreItem(id, type) {
  if (!confirm(`Restore this ${type}?`)) return;
  try {
    const data = await post("bin.php?action=restore", {id, admin_id: currentUser.id});
    if (!data.success) { showAlert(data.message || "Restore failed", "error"); return; }
    showAlert(`${type} restored successfully!`);
    loadBinItems();
    if (type === "dorm") loadAdminTab("dorms");
    else if (type === "user") loadAdminTab("overview");
  } catch(e) {
    console.error("Restore error:", e.message);
    // Restore likely succeeded on server — refresh UI anyway
    showAlert(`${type} restored! Refreshing...`, "success");
    loadBinItems();
    if (type === "dorm") loadAdminTab("dorms");
    else if (type === "user") loadAdminTab("overview");
  }
}

async function adminPurgeItem(id) {
  if (!confirm("Permanently delete this item? This CANNOT be undone.")) return;
  try {
    await post("bin.php?action=purge", {id, admin_id: currentUser.id});
    showAlert("Item permanently deleted.");
    loadBinItems();
  } catch(e) { showAlert("Connection error.", "error"); }
}

async function adminClearExpiredBin() {
  if (!confirm("Clear all expired items from the bin?")) return;
  try {
    await post("bin.php?action=clear_expired", {admin_id: currentUser.id});
    showAlert("Expired items cleared.");
    loadBinItems();
  } catch(e) { showAlert("Connection error.", "error"); }
}

async function adminDeleteDorm(dormId) {
  if (!confirm("Delete this listing? It will be moved to the Recently Deleted bin for 30 days.")) return;
  try {
    const dorm = await get("dorms.php", {action:"detail", id: dormId});
    const purgeAt = new Date(Date.now() + 30*24*60*60*1000).toISOString().slice(0,19).replace("T"," ");
    await post("bin.php?action=create_entry", {
      type: "dorm",
      original_id: dormId,
      data: JSON.stringify(dorm),
      deleted_by: currentUser.id,
      auto_purge_at: purgeAt
    });
    await post("dorms.php?action=delete", {id: dormId, user_id: currentUser.id});
    showAlert("Listing moved to Recently Deleted bin.");
    loadAdminTab("dorms");
  } catch(e) { showAlert("Connection error.", "error"); }
}
